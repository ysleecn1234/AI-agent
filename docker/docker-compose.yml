version: '3.8'

services:
  # 1. Backend Application
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: agent-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env.keys
    environment:
      - POSTGRES_HOST=agent-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=ai_hub
      - POSTGRES_USER=aiagent
      - POSTGRES_PASSWORD=aiagent123
      - REDIS_HOST=redis
      - MILVUS_HOST=milvus-standalone
    depends_on:
      - postgres
      - redis
      - milvus-standalone
    volumes:
      - ..:/app

  # 2. PostgreSQL (Main DB)
  postgres:
    image: postgres:15-alpine
    container_name: agent-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=aiagent
      - POSTGRES_PASSWORD=aiagent123
      - POSTGRES_DB=ai_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aiagent -d ai_hub" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Redis
  redis:
    image: redis:7-alpine
    container_name: agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 4. Milvus Standalone
  milvus-standalone:
    image: milvusdb/milvus:v2.3.4
    container_name: milvus-standalone
    command: [ "milvus", "run", "standalone" ]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9091/healthz" ]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

  # 4.1 Etcd (Milvus Dependency)
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 30s
      timeout: 20s
      retries: 3

  # 4.2 MinIO (Milvus Dependency)
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
